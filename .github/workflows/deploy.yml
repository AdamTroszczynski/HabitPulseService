name: Deploy to VPS

on:
  push:
    branches:
      - preview
    paths:
      - 'server/**'
      - 'worker/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build Docker image
        run: |
          docker build -t localhost:5000/habitpulse-api:latest ./server

      - name: Push and Deploy
        run: |
          ssh -L 5000:localhost:5000 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} -N -f
          sleep 3
          docker push localhost:5000/habitpulse-api:latest
          scp docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/projects/habitpulse-api/docker-compose.yml
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/projects/habitpulse-api &&
            docker pull localhost:5000/habitpulse-api:latest &&
            docker compose up -d --pull never
          '
