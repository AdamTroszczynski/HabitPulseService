name: Deploy to VPS

on:
  push:
    branches:
      - preview
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build Docker image
        run: |
          docker build --no-cache -t habitpulse-api:latest ./server
          docker save habitpulse-api:latest | gzip > habitpulse-api.tar.gz

      - name: Debug SSH key
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" | head -1
          echo "${{ secrets.VPS_SSH_KEY }}" | tail -1
          echo "${{ secrets.VPS_SSH_KEY }}" | wc -l

      - name: Copy image to VPS
        run: |
          scp habitpulse-api.tar.gz ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/projects/habitpulse-api/

      - name: Copy compose file to VPS
        run: |
          scp server/docker-compose.prod.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/projects/habitpulse-api/docker-compose.yml

      - name: Deploy on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            cd /opt/projects/habitpulse-api &&
            docker load < habitpulse-api.tar.gz &&
            docker compose up -d
          '
